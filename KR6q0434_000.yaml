body:
  text: 序序原夫妙明覺性雖自圓成苟非其人道不孤立是以拈花微笑世尊指示於西陲立雪安心達祖提撕於東土嗣後六傳分派五葉蔚興濟洞二宗揚鑣並轡般若門中之龍象卻車而載交臂而行蒸蒸皇皇於茲為盛然而萬語千言橫説豎説祇以發明一大事因緣而已世人妄業招引非獷悍難馴即萎薾不振一則罔具信心一則罕有慧力波翻雲靡散亂昏沉生死海中頭出頭沒覓筏無門良可深憫自非佩法王之雄符秉金剛之寶劍眼橫霞電氣薄風雷孰能揀砂金而就冶別碔玉以登堂教育後昆紹佛慧命也哉古來尊宿無俟縷陳維昔笑巖大師門庭高峻少所許可憨山老人荷笠瞻禮師問從何處來答曰南方來師問記得來時路否答曰一過便休師曰子甚來路分明善自護持機緣相對授受親切法乳再傳有顓愚大師克紹家風卓然尊宿嗣有法老和尚嵋岫挺生受佛遺囑乘願而來參學於江楚吳越之間驀然有得住靜於歐阜匡廬出世於豫章北地作獅子吼覺諸有情繼臨濟三十一世望初祖四十一傳道德崇巍於法自在先君子篤信佛乘鋭志深入現宰官身不廢參討歷任江右藩司簿書填委旬宣拮據之餘於本分消息殫力精求一晤師顏攄誠翹仰同安佛剎奕奕中興永泐貞玫具可考而知也師據寶華王座摻縱自由爐錘所成指不勝屈前住越山龍門後住都城清化一條楖栗隨地舉揚四席風猷儼然未散可謂作人天之眼目度末世之津梁振古軼今光前耀後者矣三瀛燥髮翹瞻長依道範幸承先澤優遊苕署而師以重刻顓和尚語録之故往來武林嘉禾霅川邗水之際時獲親近每念先君子音容云逝將及十年緬昔良晨問道深夜咨疑舉公案以勘淆訛侍巾鉢而聆棒喝儼色笑之相關或翰墨之互答一彈指間遂成隔世為人子者寧禁涕泗之沾裳乎師四會語録今亦告成命瀛一言辨茲全集瀛無坡公天覺之才自顧荒僿理當遜避以俟弘通但思瓊笈珠函初經結集法寶大成人天讚歎使先君子而在必當合十獻頌相視不逆附以不朽矧小子瀛安敢自外於是援㕙穎滋隃麋焚瓣香而敘其梗概焉述先志也時大清康熙拾伍年歲在丙辰佛誕日法門弟子三韓余三瀛盥手敬撰於苕溪公署法璽印禪師語録目録卷第一序同安上堂晚參卷第二同安上堂卷第三龍門上堂越山升座卷第四清化上堂晚參卷第五小參普説示衆茶話卷第六法語卷第七勘驗機緣參見機緣卷第八書啓卷第九真讚自讚卷第十頌古偈詩卷第十一佛事卷第十二募疏雜著目録終
