body:
  text: 嗣法門人性圓旋璣旋哲旋賢等編次頌古世尊初生一出娘胎慌腳手忙將霄壤指周全無端陸地波濤起惹得千秋禍業傳夜睹明星夜半山頭開得口早已失卻一雙睛桃源不如收拾去免得漁郎來問津女子出定欲出不能出出得亦非出罔明與文殊兩兩遭一跌百丈野狐二首不落與不昧一鼓兩頭擂收卻鼓桑子二人袖手退一昧一落一墮一脫者般話會一齊掃卻國師塔樣古塔呈君君不識全圖捧出龍睛失兒孫雖是覆重拈鄭虔依然難把筆德山托鉢等閒托出未聲前引起傍人論正偏不是他家賢父子幾乎百世把名淹牛過窗櫺頭過尾不過將月繫蘿藤月落藤枯後目前絶疏親南泉斬貓一治一亂自古相換拈起青霜是非已判咦若要家家歡鼓樂太平不出將軍斷九峰丹青堂堂志公真阿誰寫得親僧繇卻能繪也是曲作伸溈山牯牛一國無兩主邦家始太平溈山僧某甲錯會去安名芭蕉拄杖有即與無即奪裒寡益多轉轉交錯撞著一個沒頭人笑得唇皮俱脫落韶山是非不到是非有句無秋江月落鴈歸蘆放開一線雖言有依舊佳人一個夫大隨覆龜皮裏骨骨裏皮眼珠換卻莫言迷草鞋皮骨一齊泯卻被盲人返笑伊定上座問臨濟話傍觀者清上局者迷占得腹裏去了邊皮不是奕秋回一著幾乎輸卻一盤碁香巖上樹二首平田萬里沒遮欄須信壺中別有長若向樹頭去卜度黃連草內索甘糖如人上樹強安譬喻伐去樹兒了無證據憲宗迎佛舍利百辟皆賀覿面俱錯韓愈端立眼橫鼻直問道如何是佛光管教致得口門窄雖然陛下問分明依舊吾王眼打失乾屎橛雲門乾屎橛千古不曾缺拈出與當陽諸佛不能測青州布衫青州布衫子無外亦無裏一稱稱將來都是自家的付法偈三十二首與雲陽迥波隆首座雲居末後震威喝霹靂當陽那個知今日許君親吐舌從教頓起馬師機與同安眉劍圓首座吾佛傳來正法眼當年迦葉得親聞家私盡底重拈出今對人天付與君與龍門慎獨璣首座龍門一派曹溪水今古滔滔話不窮獨許慎公吸一滴頓教陸地起飛龍與慧峰牧恆依首座明月堂中彈古調空王殿裏傳知音惟君記得吾宗旨赤手拈來印汝心與獅峰生一真靜主獨踞獅峰吞宇宙懸崖返擲展威風此回跳出金毛隊吼吼群狐盡失蹤與大雲佛西堂一喝家風振古今時人那個可傳心看來黃檗口中舌獨許雲公解縱擒與靈嶽賢侍者臨濟一條楖栗棒殺活從來都不讓而今分付克家兒魔佛衆生俱膽喪與楚庵哲西堂佛祖傳來正法眼無端滅向瞎驢邊叮嚀好去千峰外振起吾宗舊要玄與劍門定監院殺活一條生楖栗付與吾兒待時節橫拈倒用接群英繼起先宗真骨血與松固乘維那馬師一喝吼如雷千古聞聲喪膽威獨許吾兒親徹骨一肩慧命付全提與吼雲悟知浴高高峰頂留不住海底深深縱步馳我祖門庭千古任主賓玄要在君持與海門元侍者三呼三應值生冤折盡烏藤不記年驀地一回開眼界海門深處釣金鰱臨濟命根元不斷一條紅線手中牽與入素白知藏洛陽橋下放驢歸不負當年顯大機楖栗一條傳慧命人天千古仰雄威與芝庵信知藏一喝兩喝三四喝振起家聲眉宇豁佛祖魔王喪膽魂白日青天星斗脫電掃雷轟已是遲神龍角虎都教奪如來慧命要人持分付吾兒一手掇與孤明慧上座棒開魔佛分賓主喝破虛空定要玄自此人天堆裏去直教拄杖遍三千與鏡林以維那佛佛授受祖祖相傳黃檗三頓臨濟徽猷唯有吾兒多迥別一椎擊落萬峰頭與大拙慰維那臨濟傳來生鐵棒三界郎當沒處放分付拙公親手持佛祖魔王俱膽喪與鑑源知藏達磨遺下一隻履直至而今提未起分付鑑公信腳穿從君倒走三千里三千里滄海深深踏到底與巨濟源侍者顓師曾用一柄傘不論晴陰并早晚分付吾兒亦若持遮蓋人天無擇揀無擇揀萬象森羅齊具眼與隱巖智知客靈山拈出一枝花此日正當香得妙分付隱公代舉揚必要人天齊發笑齊發笑三腳驢兒滿地跳與絶學侍者學無學是真學絶往絶來筲箕木杓休言樣子不值錢要識其中金不博五車三藏本非真一念萬年猶是縛我祖西來口不開單將此事付無學與裕芳維那今古鳳選佛場中興玄要起聯芳烏藤直下親分付百萬人天任舉揚與山雨恩上座佛祖當年第一機拈花微笑待人知今朝舉似山雨去好向人天勘嫡兒勘嫡兒有威慈臨濟門庭從此振傘居風月代相持與肯堂心知藏柳巷程途過便休端州破衲不須留夜來明月堂前句獨許君家擅唱酬與月江定上座傘居風月遍江天歷盡春秋未許傳今日同安親舉出與君持去傲雲巔與孝廉晉公閔居士別號冶庵烏藤七尺逞風流臨濟拈來解放收分付冶公擔荷去好將佛祖結深讎與少宰雪堂熊居士迦文大法付王臣歷代傳燈六十人珍重西江熊雪老好將臨濟令重新與方伯斗所余居士別號道庵佛祖傳來正法眼至今大地莫能藏同安堂上重拈出付與余翁代舉揚與御六張居士傘居遺下破油靴三十年來不染沙今日同安親舉出御公穿去驗龍蛇與兵憲旅菴曾居士航海鹵來老達磨平將陸地起風波心空及第誰堪委獨許曾公到恁麼與濟臨郡侯廖居士號柴坡公堂舉掌勢難裁直下承當一笑回碓嘴生花香滿院蝦蟆𨁝跳上三台與別駕萊臣余居士一枝白拂付萊公直下承當氣宇雄驗盡諸方猶不歇可稱獨步占寰中囑密悟監院相隨兩剎同甘苦十二春秋未變遷個事雖然瞞不得不如傳戒待龍天囑聞旋侍者記得南陽三喚意今朝特地囑吾兒他年石馬回途後別有聲名天下知囑斷山監院三載披星何所事欲窮千里展眉愁直須踏斷雲山面始信江天共一秋囑鏡初知客曾作溈山水牯牛耕翻大地未曾休而今吼得虛空碎好向深林臥碧秋囑國一侍者出山同安堂上獅兒跳出金毛隊裏一吼當陽震地天群狐驚得奔千里囑松齡悅衆佛頭峰上騎獅子馬祖堂前弄象王恁麼男兒行腳去歸來正好細商量囑元長侍者歸匡山侍師掀翻窠臼透羅籠送子歸山侍父翁直待獅峰重點首一聲吼出起宗風囑旋珠熊二道人天然婆子丈夫才無中有路出塵埃踢倒少林西祖意頭頭成現不須裁囑靈機大德十載殷勤護祖庭嚴霜烈日不相侵從今不改初心地他日歸來付好音囑龍門知客昔日道人彌陀誦今朝知客誦彌陀直教誦得無生句始會將磚作鏡磨囑龍門侍者坐臥經行分付汝時時要識主人翁將來受用無他囑規矩不離二六中囑龍門監院山前一片閒田地分付吾曹騎水牛騎得牛兒步步實自然秋到有全收囑龍門副寺善法堂前柏樹子趙州拈處意浮沉若從枝上討消息早負當初一片心囑趙共玉居士歷代祖翁提向上兒孫盡被成虛誑而今珍重趙玉公切忌逢人莫錯唱囑鼎生蔡居士血心片片惟知己祖道殷勤過量人頓把修江為玉帶鳳棲千古鎮常春囑雲石俞居士龐翁昔日追群侶裴宰當年問聖僧從上諸君無底案分付俞公一手撐囑子賢周居士當年臨濟三遭棒今日拈來舉似君活捉生擒龍象聚紅塵堆裏著功勳癸巳春受同安寓庸公請剎竿欲復老煙霞扶起還須出大家珍重當年曾付託佛頭峰上一枝花受龍門覺真化宇慧然請不惜老年登越嶺為懷祖席久虛沉者回揭出空王印印破龍門一點心囑育林義尼威音那畔一著獨許林尼透脫驀然縱步這邊不負法門重託示道睿知客井井無窮道睿深滔滔寫出劫前音他年若得承源底與汝相將踏上林示曇現禪人春秋不落香盈地雨露無沾亦秀芽透得不萌枝上意始知處處現曇花示智修禪人春風正值拂春枝步徑臨川得意時識取智光原本具方知更不假修持示高鑑禪人野鴨翩翩飛過去鼻頭扭得痛相當若能腳下親高鑑哭笑方知自舉揚示截流禪人鎮海明珠光燦爛須知不向外邊求當頭一截根源斷修水文江總逆流示東升禪人居山茅庵深隱煮砂鍋教汝居山事若何就裏一枝無柄钁祖翁田地要耕過示大冶知衆紅爐焰上雪花飛佛祖輸他一段機會得真金不博意任伊百擊有便宜示六和悅衆隨師秉拂度洪都末後牢關會也無若要老僧開示句秋風撥轉洞庭湖示荷庵庫頭草庵止宿是誰知山水相忘直不疑但看百花香笑處緑楊依舊點牛蹄示孤輝大德一輪皎潔無伴普天匝地難藏不與萬法為侶時時揭露常光示明達殿主日課兩堂常不絶香燈人境幾經年直待鼓槌拋卻後許兒曲枕傍雲眠示隱素大德人皆不識我名我亦不知人姓隨山隨水安居自是一生孤硬示晦機孫八萬四千諸法門清淨毗尼為第一開遮殺活是拈花切忌鉢盂重安柄珍重晦機賢長孫傘居門戶當承褫示履素孫維揚法窟九蓮開遠自台庵一脈來但望時時思祖德他年跨灶識賢才示遠詣孫遠溯曹溪月影深須知形跡不相侵但能親詣臺山路自有霞光燭汝心示密清值歲宗乘向上欲何通運水搬柴顯個中普請牌兒將掛出滿堂雲水笑相逢示道安禪人匾檐頭邊明個事腳跟翻轉舊家風超然一段天真趣正好扶笻侍老翁又目前百草祖師意屋後青松古佛心就裏明明無隔越何須更去覓知音示道徹大德泥牛昨夜潛蹤跡直至于今未舉鞭借問其中消息路大千沙界一同年示自若大德一片袈裟洗卻後半肩雲水去還來莫道同安無新令鐵牛步步踏蒼苔示玄生大德依我龍門共鳳棲久遠身心實罕稀今日老人親囑纍因緣秖待在歸時示樂如禪人禪人一見鳳棲老膽大心粗氣亦雄記得鉤頭無限恨他年指點赤飛龍示接代德音副寺金剛般若自心彰法法頭頭佛道場日用但能如是住天然德業有威光示接代若木書記文章筆下自如事一貫吾門莫是麼書記秖須知接代一身及第兩登科示接代慧明侍者汝師指過淨瓶來應是非常濟世才此話不消多節目無陰陽地有花開示翠巖侄傘居有一無私句欲望吾兒代和音他日果然不負約同安堂上見新吟示子玉禪人遍參蕩蕩春風遍界寒劫前無句可盤桓而今且向諸方去他日歸來倒剎竿示啓愚迪參頭寶鏡堂開露祖機參天翠柏總成詩當年趙老親拈出今日同安特舉之劫外靈根盤大地春前老幹覆清暉婆娑一段西來意付與人天遠依示道遠侍者行腳但看溪邊桃與竹春風幾度迎新緑明明舉示遠禪人何必迢遙去追逐示見誰禪人記得當年入室時天公始涉不疑誰雖然瑚器堪成用更覓貧人衣內珠示證初大德住山志氣要超群鐵臂銅肩敵萬軍坐斷白雲頭自點方知佛是麻三斤示覺定禪人受戒金襴應量親收得今日拈來舉似君珍重時時常記取莫教辜負嶺南雲重遊越山示峰元禪人昔年留下破襴衫此日重披勘聖凡才到祖堂鐘鼓震不須豎拂口喃喃示佛珠戒子戒珠光照三千界分付闍黎善護持不許囊藏與被蓋更須露出兩莖眉示達性沙彌沙彌初入鳳峰一見超然意氣濃若是吾家真種草他年擔荷祖師宗示不倚禪姪霹靂光中顯祖威無毛鐵鷂頂門飛等閒覷破通天句紫竹心空及第歸示歸源禪人大地山河歸一鑑個中消息許誰通忽然觸著毫毛豎始信床頭杖化龍示公延禪姪當年曾問鹵來意直指雲中佛頂峰他日一聲高喚出心空及第振家風示湧輪禪人黃梅夜半傳消息明月堂前續正宗今日拈來聊舉似莫教辜負鳳峰示紫嵒米頭墜腰石𨁝跳鐵碓觜開花舂熟籮中米自是有篩家示日紅知殿出山從容托鉢長街去米到廬陵價不違楖栗高懸中有待天涯行盡莫忘歸示慧照孫處處青山呈舊面家家明月露新容果然得到個田地堪作吾孫振濟宗示應塘鄧居士懺經性海華嚴末後句法王座上為君明他年解得其中意管取毗盧頂上行示幼全李居士懺經不惜芒鞋來祖室當陽一句無端的要識華嚴劫外光九九從來八十一示素白居士馬師口似虛空大龐老女兒不娶嫁咦嘻而今達道人還須痛快棒頭下示堪輿斗南劉居士溪山踏遍老歸心太極如如不用尋識得水窮山盡處釋迦峰上話知音示君直居士與君相對話真風覿面全提應不窮再得耳聾三日後白花影裏更添紅示東泉黃居士唇舌生鋒大有奇腳跟下事賴君知果然萬里無青草荊棘林中許自持示龍江孫居士祕旨高深未易推喜君玄要自堪期果能直下無差別臨濟宗綱待汝持贈岱宗禪宿放出溈山水牯牛千峰萬壑盡良疇等閒不逐東西岸驀鼻牽歸臥碧秋贈慈雲法姪歸楚邵陵此去千餘里不著芒鞋便到家記得龍門末後句當陽切忌向人誇贈慈圓法姪歸楚相逢難得投針芥針芥相投豈易遭珍重萬松林裏去無風正好起波濤贈西意和尚坐斷雲山得自由侍師三十老春秋恩深相對難回避倒卓爺頭報大讎贈淨方和尚湖北湖南道不孤風流賣盡老頑夫傘居一段陳公案每向人天驗釋儒贈西生和尚傘居密室多麟子獨許吾兄力荷先處處喜登獅子座廣長舌相續單傳贈大觀禪師雲居吸滴明湖水噴去能滋大地枯今得龍門覿面喝金波銀浪起江湖贈入密浪法姪釋老當年呈醜拙飲光密地賣風流君今已入南山室何事煙波不下鉤贈山樗法姪濟宗門戶孰能開須是獅兒出窟來哮吼一聲天外去從教大地絶狐猜贈獅眼禪師越嶺峰頭踢彩毬翻身白下幾經秋鳳棲一度重相見只為當年陷虎椆贈雲庵煥章禪人拳室洞開日月芒鞋踏破乾坤者般受用誰有獨許白雲共分贈芥庵悟生禪人芥納須彌不大毫吞巨海無餘個中機用誰得應是覺公遺居贈久隱禪師十二巫峰齊踏斷天童堂上芥針投得來一塵揮魔佛鄉里同安見也愁贈耀寰葉居士認著本來原是佛還須更透祖師關果然覷破真眉目土塊石頭俱點顏贈相中王居士記得貓兒話有因一刀兩斷絶疏親趙州昔日來遲也留與王公驗後人寄超宗和尚萬松衣鉢傳人去一杖迢迢入遠山兩眼不須空宇宙自然說法化塵寰寄酬文宗博庵黎護法撰龍門十方碑文龍門碑記十方居選佛場開驗瞎驢錫杖峰頭懸慧日光輝祖席有題書寄公弼涂居士刻寶峰伊庵禪師語録隔山已得相逢句鐵馬嘶風處處聞扶起泐潭未了案傳燈何代不知君寄孝廉白常熊居士當年希運招裴相今日龍門醒白常不是一聲高喚出祖庭焉得復生光祝爾絃王文學時登花甲重開運古柏煙消色更鮮寶鏡池邊千葉柳拈來奉祝萬斯年祝清泉元白尊宿天童大法泐潭開一滴清泉遍界洄蕩漾鐵船風月秀千峰稽首到華臺祝覺宗闍黎鉢底清波泛大千西江個個頌耆天本來壽域無今古一任春秋體自然祝冰鑑和尚不記春秋弘祖道東乾西竺悉中行法幢重振龍蛇動今古人天仰太平祝徹庵道弟不避寒暄扣祖帷傘居消息要深知而今鐵樹花枝綻好把無生詠紫芝祝宜庵禪師唐福山中弘大法栽松道者復重來古今面目難窺見獨許宜公善自裁祝湛明禪友繡谷風高香世界清心明月映雙溪都盧總是生前句信口吟來作壽題祝戒如禪友白雲深處青松寺不逐寒暄太古心分付華西三祝客無勞那畔乞威音請凌白大師歸老人塔上家聲遙振楚山墟滅卻先師者瞎驢記得乳峰親切處倒騎獅子上雲居為余門性淳女開關打開無縫黃金鎖八面玲瓏理事融更有一般超脫處晴天高捲玉簾櫳詩七言絶山居五首一個茆庵一個僧住行鉢底米無升夜來撥出無煙火直教寒山烈焰騰最喜家常無一物更深夢得淨因窟人情不但是空華一切有為如電拂住久深山多寂寞全身坐斷白雲涯資生只倚黃虀飯供客還將趙老茶幾度傷思兩鬢霜懶將名利混諸方青山影裏尖頭屋火種刀耕道自香折腳鐺兒為活計鋤頭鍬子作生涯山前一片黃茆地翻轉春來好種麻遊山盤桓直上五峰頭曲徑寥寥古洞幽巖下啼猿聲細細不知埋沒幾春秋又踏遍崚𡾓趣未窮雲生谷口帶微濃枯藤拄杖猶多健任轉千峰與萬峰詠梅花不畏嚴寒帶雪開枝枝綻玉破香腮春風何事傳山下惹得騎驢客上來喜雲曇禪宿復同安祖庭悠悠古剎同安寺流落塵寰百八秋一點靈機埋不住輕輕點著即回頭經行長空寥廓一孤僧夜夜峰頭月下行行到水窮山盡處歸來打破煮雲鐺夜坐望月寒嵒深處月來遲兀坐危危意若癡偶見疏林通一隙移歸窗下讀殘詩酬獅聲大師過訪不棄虛堂意語投愧無一物可相酬家中幸有無煙火爛煮秋風供上流伊菴古雪二禪師過訪兀坐茆齊正寂寥苔深誰唱白雲謠喜同品字煨香芋且向寒爐把火挑挽石頭庵沖懷老宿遙憶春光對坐時和聲共讀落花詩千紅萬紫歸何處留得山山動遠思贈退庵同參記得茅堂曾與話青山緑水共投機而今再得通消息萬象森羅聽指揮又龍門住處雖云遠修水同安路不多丕祖堂前扶舊案大家齊步唱哩囉示本幻侍者行腳五載爐頭話正歡芒鞋又到腳跟寒寥寥此去無忘卻法乳溪邊度釣竿春日坐小園偶成春風拂盡老煙霞坐對青天喫苦茶識得東君言外意墻頭初放一枝花祝汝鐘閔居士雲居一見已安心老大風流貫古今不二門開隨出入重重獅象壽儒林弔匡山羅漢坪絲外大師不見床頭楖栗木惟餘崖上半間雲椎胸痛哭臨行句正眼圓明獨讓君又憶昔雲居同入室月明簾外解翻身而今鐵笛一聲去喚轉山河大地春挽優曇師兄同條生不同條死始是吾門骨肉親今日相逢難見面邗江千古仰殷勤弔汝鍾閔翁護法有引居士皈依先師顓老人承當個事每設壇禮圓通懺以報佛恩第山僧由越山龍門同安三剎皆賴身心護持前冬聞公仙逝即欲赴弔奈因祖庭土木工羈迄今兩載方得臨柩特作俚言三首以竭道懷想公寂光中有以知我也雄名已久播朱門德業文章萬古存怪殺西風攜袖去徒遺書劍在乾坤二十年來忝法交吾宗所繫謾言匏老瓠莫謂浮江漢更有新瓢托下梢君脫衣冠乘化風我聞血淚浸虛空奠香不及依時候想必靈光鑒異同詠雪獅子蹲踞無畏吐寒光玉影孤蹤孰敢當莫向臺山求大智尋常騎出有兒郎春淡雲靄靄動遊人多少花街興紫宸滿目春風關不住一枝點出故園春夏薰風一陳緑荷香驚醒漁郎午夢長喚起兒童烹苦茗閒來拽杖步陰涼秋雨滴梧桐聲颯颯風翻丹桂影層層夜深木枕涼無比留得陰樓待月登冬紙被圍床深夜坐不知爐內火生煙饒他隔岸霜鐘報只是蒙頭熟打眠五言律雲居接給諫熊青翁居士一入真如寺山林展笑容風生人面冷露結草頭濃去道吟秋月回途對遠峰孤身瓢笠客也得近高蹤訪伯彩袁居士書房記得盤桓處依依若對容兩行疏影竹一帶密陰松坐石忘今世看雲話古宗懷君心意切持杖上孤峰禮東林遠祖塔芳聲傳國外別業到于今寺老青松骨池寒白社心一輪峰頂瑩三笑虎溪深不是回天力誰堪和祖音詠金竹坪平頂松傲盡風霜遠叢中獨占奇疏枝幽鳥託老態碧雲欺月孕苔痕古嵒吞鶴影癡濤聲潑在頂驚起臥龍知遊越山特出高霄漢群山落下風洪崖肩可拍百丈氣原通夜月穿湖底曉雲起谷中空王居頂上八面自玲瓏與管生舒翁居士遊雙林古寺偶韻偶言東晉寺攜我過林中苔掩唐時路山藏宋日風堂虛思忍老名勝藉權公不仗郢人手焉能展大雄七言律山居五首芒鞋踏著好居山扠把黃茆宇宙間紫芋爛煨隨性飽衲衣破綻任情閒疏雲秖合棲嵒谷皓月無分照市闤土面灰頭無俗纍孤峰獨坐聽潺湲孤峰寄跡冷蕭蕭懶向人前數寂寥山有淺溪藏古月林多修竹挂新瓢鐺中慣煮連根菜爨下時焚帶葉樵僻谷了無塵世事任他湖海浪生潮一個茆庵居物外無心拾得未輕輸飄飄毳衲人同少寂寂柴門道不孤坐斷千峰雲作伴烹殘萬壑月為沽家囊雖是貧如洗拄杖還堪出入扶茆庵半結五峰腰千尺飛泉度短橋風撼巖松驚鶴夢溪分蘿月引猿咷流雲繞榻經三匝過客參堂只一宵地僻山高塵世遠誰同掬水飲終朝卜得嶙峋儘有奇市廛名利不相推巖深洞古雲來密徑小峰高客過遲白晝臨風趺亂草黃昏帶月續殘詩山中受用誰堪語只許山中人自知再訪獅子峰獅聲偃峰二禪師寥廓柴扉不設關峰頭獨步任留還苔深路滑雲先到松老枝疏鶴易攀花綻碧嵒春意別風生翠壑晚情閒幾回拽杖同君晤高眺鄱陽水一灣雲居覓隱者寥寥一杖出簾櫳小徑高低煙水濛野鶴衝開北障山猿攀動嶺南風尋源直透千峰上覓友橫穿碧澗中因愛行觀耽閣久入門不覺月升東舟泊大同有感輕舟一宿大同城漁火爭開兩岸明夜靜蘆深鷗入夢天高雲斂鴈歸聲秋山古樹添詩思晚浦新潮長道情來去幾多江上客不知白髮鬢邊生吉州禮隆慶祖塔有感登臨祖塔日初斜草色離離未可誇蹤跡蕭然閒世外聲名久已落天涯山高不識崑崙勢寺老今歸豪貴家怪煞千秋龍象地誰能還我舊煙霞禮天龍祖塔有感路滿寒霜竹滿扉殘碑剝落草初回法堂破案塵埃靜祖殿深苔足跡稀月照蘿龕清且冷雲來松澗住還飛何期特地從新令千古雄名一日歸送玄微禪師入楚未久盤桓楚地行遠風高掛一帆輕因思黃鶴樓前句卻憶青鷹夢裏盟兩岸春莎同我淡一船夜月為君明應知此去無堪贈先賦齊安赤壁名登崖頭寺坐月有感兼勉煥章禪人巖頭萬仞碧崢嶸月挂藤蘿徹夜明疊疊泉聲超世遠重重雲影接天生誰開老寺垂今古何代閒田任種耕分付煙霞塵外客調羹莫負昔人名贈制臺玉翁張居士數年威鎮西江地文敕煙塵盡掃收寶劍弗施魔已伏征鞍未跨帝先酬名垂日月輝千古道重乾坤育萬流記得靈峰曾有約何妨弘護祖徽猷贈臬司蘇居士法堂兀坐笑相逢促膝猶臨鷲嶺風凜凜冰霜生六月炎炎暑色寄三冬毫揮黃峽漩流水覆育青天轉落紅扶豎宗猷須仗力蘇翁原是舊蘇翁贈臬司補念秦居士昔年馬祖出龐公今日何殊鼻孔同南浦三秋懸古月西江千里播清風紅塵堆裏頻垂手紫閣臺前獨點胸收放縱擒惟掌握聖名凡號豈能容贈巡憲伯衡周居士江漢澄清惠澤新襜帷駐處自生春蓮花君子能鍾愛草履山僧似飲醇經緯縱橫聯上下珠璣錯落燦星辰文章事業成雙絶名覆金甌第一人贈文宗印周王居士乾坤大道選文場鳳閣龍樓翰墨香筆落明珠光萬丈胸藏碧玉映三岡絃彈覿面言前調樂奏聲聞劫外鏘愧我何能躋佛印喜君德不讓蘇黃祝寓庸請主兼懷祖庭事蹟公生無祝逮華封舊案拈來表寸衷崇勝昔年施血戰同安此際襲宗風群花既洽回天力百草奚忘貫日功父子身心援祖道勳名誰敢不流通過清涼臺達道禪師不遇孤峰特出遠塵寰小徑新廬晝不關白瀑泉懸青嶂裏紅桃花綻碧嵒間昔年共讀風前韻今日惟看雲外山滿目畫圖收未去且留明月道人還寄東林主人喚鐵禪宿曾過東林經一宿虛堂無壁傍雲眠六朝白社池心冷千佛青燈夜月懸鼓罷鐘沉今復響經殘道寂此重傳若非天外孤笻至誰向芳郊覓隱賢雪朝和伊庵禪師韻寒床昨夜睡來遲早起童呼竟不知乞食鳥歸驚曉夢尋香客到供春枝敲冰嬴得盧同碗撥火輸開溈老眉獨坐茅廬思舊識六花片片問阿誰和文宗博庵黎居士韻為上藍記事冒暑扶笻問大夫相逢底意莫能呼維摩奧室青獅座𣆀老新堂舊馬駒欲向城邊弘古道宜須源上洽居儒翻思昔日推車案何事階前丈草蕪和少宰雪堂熊居士十載雲農不出門茲來為惜祖燈昏若非流水新浮瓣那識桃花別有村佛老一圍蘇子帶顓翁三世笑嵒孫筆中透盡玄中句頂上青天足底坤贈給諫約生熊居士雲居一別十餘春笑指相逢兩鬢銀五位正偏俱截斷三乘玄要悉堪親光垂祖剎千年舊恩普禪林百世新今日特來呈塔樣請君拈出話當人贈邑侯渭綸屠居士寶印高提繡谷峰權衡有道自心空雲生雙舄凌煙上鳳舞丹霄玉殿中性海澄渟施舜德法城穩疊布堯風生生化育如天地更好威音一著通和孝廉晉公閔居士入龍門韻道荒德薄負蒼天相對今朝愧昔年越嶺雲旗曾法戰龍門爐焰許凌煙床頭才得支郎杖堂上重開馬祖筵獨喜此番春正遇一枝繁蔭劫初前復宿雲居明月堂見羅漢垣有感兼懷季納熊居士深懷疇昔干城護今日重來明月堂鶴返故林思故主蝶歸花苑採花香薰風涼閣傳新令碧水流雲繞舊場十載歐峰頭面冷秖存周匝一垣墻喜方伯斗所余居士建法雲律堂并贈拽杖迢迢睹法雲莖茆頭現紫金身若非古佛舒千臂那許閒僧繞萬楯浩浩塵中能作主堂堂化外自來賓相逢不覺投針芥祖道垂秋又復新賀南康郡侯昆湖廖居士來任幾年畏壘憶君心此日重逢五馬臨柳拂金章歌晝永花迎紫綬宴春深匡山草木懷元晦修水煙霞識趙襟記得當初驚夢句還于鐘鼓續長吟賀建昌邑侯藿思李護法文星此際下車來梅雪爭春萬戶開畿甸遠遊飛舄上海昏寬賴繭絲裁琴堂久望陳君績草野遙瞻宓子才三異賡歌民奏日還留玉帶鳳棲臺懷掃庵談翁居士高聲久已播東南自恨無緣覿面談雙徑峰前心法露淨慈池畔道光含三朝肉祖由言著萬古宗猷仗力擔異地同風應寄紙那堪短杓海中探和蘇庵劉居士為憐師道入山孤覓火挑燈夜不紆莫謂青原無嫡裔須知龐老有良駒輸君環珮名金闕贏我玻璃注酪酥不負當年親記莂同安依舊會宗圖次東巖和尚韻何緣拽杖祖庭遊相對虛堂話更幽愧挽真風驚世子喜來紅日樂嵒丘鴉飛鵲噪春山好草色花香道脈悠消息許誰通一線斷翁顓老續先猷壽紫竹林妙明和尚法輪常自轉青筠黼黻人天萬古新南度煙霞開斗柄西池風月透欄楯杖頭花現優曇色鉢底香浮上苑春柳巷遺來親指掌惟兄盡露五湖濱懷西生大師記得飛笻過考盤疏窗猶恨雪霜寒一朝插草揆先哲十載支薪壯遠觀寶鏡池深通吉水廬陵米價探修瀾不忘鳳嶺臨風句佇望同扶舊剎竿懷西意和尚一展慈光已七年春秋荏苒若無遷夢遊歐阜雲同賞話別文江月滿弦柳巷綱宗惟大播傘居消息幸多傳不辭飛錫來先塔鳳嶺猶歌別有天次晦山和尚過訪韻聲名久已出塵蒙覿面雄談動象龍果是天童傳少室不虛歐阜起雙峰三生共飲曹溪水一席同聞鳳嶺鐘寶鏡池邊才揖別洞門依舊白雲封酬雲巖元潔和尚過訪話舊一見鴻川水逆漩遺懷二十有餘年辨山風入龍門浪古洞雲浮鳳嶺天賦質同時邀劫外談心共譜約生前徐陳此日重相遇莫使聲名世後傳禮五乳憨山師翁衣鉢塔幾年懷渴謁師翁才得登山展積衷明月照時心鏡露白雲飛處鼎煙濛七賢侍座開生面五老排門繼古風今日小孫來九頓願教血脈布寰中酬諸子賀進新方丈韻方丈新成列祖基中興法道在斯時多年種竹留丹鳳一夏攜瓶灌紫芝荷衆自慚德業晚酬機猶恨語言遲只今負愧單傳旨不仗群英復待誰入京謁雷臣余山主萬里長江一葦航山川迢遞悉商量櫓聲晝入三台夢帆影時懸五鳳纕玉露點成丹桂彩金風操動緑荷香我來不借山陰興護法堂前別有光謁元臣余山主有賴先人玉帶垂遠乘輕艦入邦畿秋風拽動河邊柳曉日披開洞口芝遙望北城青氣靄翹瞻南岸白雲低孤舟萬里情難狀聊以心歌一解頤入都蒙萊臣余山主先視作此奉謁疇昔文輿轉玉寰餘光常燭鳳棲山因時買棹乘炎氣指日扶笻對笑顏忽感雲堂先過視莽排心曲不遑刪到來自愧無堪獻幸借秋風點翠斑謁翰林學士子靜李居士雲外風飄翰墨來故園秋色影三台時登玉闕珠璣露日陟金階錦繡催德重普天知大體聲高舉世沐鴻才餘光尚續傳燈焰西蜀遺錢豈復猜贈嘉興郡侯遵度王居士之任時光遠燭帝城邊榮發臺隍五馬連紫綬低垂楊柳岸金章微拂芰荷天威宣巖壑風聲著令布滄浪月影懸煙雨樓前歌晝永還思世外有餘篇離鄉自出川江數十載逢人從不問家音遨遊四海垂鉤釣放浪千山種玉金每共長松歌短調常同麋鹿喜登臨餘情盡付鄉關外只有單傳一點心參禪歌參禪好參禪好脫卻夏天衫更披冬月襖豎起鐵脊梁塵埃都教掃三更紅日正當空千峰萬峰齊靠倒禾山打鼓囫圇吞棗雪峰輥毬拋磚引寶呵呵呵倒騎鐵馬出同安秋水秋山何時老四威儀山中行清風竹杖輕撞著賊且喜一身貧山中住家風無別慮養顛狗放出捉狐兔山中坐白雲來幾朵問如何蒲團齊坐破山中臥兩腳長伸著絶親疏一些過
