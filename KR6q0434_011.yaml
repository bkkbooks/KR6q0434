出凡倫下火舉炬云會麼者是汝現前三昧耀古騰今無堪敵者雖然也須山僧為汝道破遂一喝云高著眼吾今助汝一星星到處圓明光爍爍攛下為優曇頤公老宿起龕高高峰頂立深深海底行木馬騰空走玉象出崑崙恭惟圓寂優曇師兄頤公老宿得根本智于顓愚老人受具足戒於密雲和尚編參知識踏斷差別路頭咨詢名山露布頭陀苦行末上邗江拮搆禪室四十年來把住要津不通情竇直至幻緣將謝之時等間道個門前柳色垂青眼檻外諸峰笑點頭即此二語不唯繼續圓通二代即我傘居先師父子不傳的極則處亦被師兄一時漏逗了也弟自燕京回南特過此燒瓣香以盡同門之愛不期乃徒旋恩旋義暨諸眷屬等於西南角上卜得一片無陰陽地欲建無縫塔子今當吉日良時請作起龕佛事是以忍俊不禁葛藤至此不免常寂光中軒渠一笑一笑且置只如起龕一句作麼生道遂進前以杖擊龕云桃花處處笑相迎高移一步春風送入塔以拄杖指云盡十方虛空盡十方世界總是師兄者一座埣堵波自古及今函蓋乾坤不通呼吸無雜無壞無始無終到恁麼地正好與萬象森羅情與無情一齊證入無生國裏端拱無為自由自在雖然如是猶有一點罅縫待小弟蓋覆去在且道作麼生蓋覆以拄杖作拽勢云一方頑石拽將來猶待家人親手擲復卓云恰為嘉興郡侯遵度王公大護法燒香無去無來靈光獨耀不生不滅本體恆存恭惟中憲大夫王護法悲願不忘現宰官身而說法雄才特用懸金斗印以衡行驅五馬於黃堂御六龍於赤絳諸山各剎總沐鋾鎔田叟漁翁俱叨化育山僧初晤于燕都再逢于檇李幾度盤桓無非中道正好撫國安民忽唱還鄉曲子嗟夫西來大意未盡商量刻藏因緣委諸檀度此非護法有棄於山僧蓋為山僧無緣於湊就茲居旅底無表寸私特向尊前瓣香作供只如來格來歆一句作麼生道插香云信手拈來焚寶鼎氤氳端的透朱陵同安挂鐘板師拈椎云人天號令祖師繩規今日重提風行草偃直教一箇箇皮穿腦裂膽喪魂驚不守自家窮活計豈容先聖舊儀軌雖然如是且坐斷見聞一句作麼生道遂擊鐘板云一撥靈機天地隕千差別處絶纖塵
