body:
  text: 嗣法門人性圓旋璣旋哲旋賢等編次佛事掃北京笑巖寶祖法身塔久視云關子嶺上印破虛空面門烈焰爐中焚卻本生父母以金剛變相三昧酬答聖僧將如來最上一乘開通後學主賓互換照用齊行縱奪隨宜殺活自在坐孤峰而不見雲霞之色居十字而杳聞風月之聲繼法脈于將危續宗風于未墜聲名洋溢付囑聯芳法統津梁宗門關楗雖然若非龍池幻翁曹溪憨翁法派兩源流通海內爭得臨濟一枝遍滿天下今日不肖遠孫來叩塔前無堪報德以大地為爐日月為炬白雲為香青山為供列于我祖之前且道還來鑒納也未良久顧衆云寶塔玲瓏無背面兒孫千載仰高風展具大拜掃五乳憨山國師衣鉢塔師視幀云格外針規當陽正眼操三玄甲而疏曹溪之脈整萬古綱而續柳巷之風胸藏雲六合筆奮海千尋世稱臨濟一宗遍滿寰宇若非師翁宏願法道焉有今朝法孫印仰攀碩德繼續芳猷中興同安祖席提持向上宗乘此日特過五乳峰頭潦溪毛之供致祭於中興曹溪憨翁國師之靈酬昔淵沿欽承妙旨顧左右云還有未知源流者麼拈香云一炷兜樓觸鼻孔從教法乳振聯芳曹溪中興憨山國師忌辰獻供師至像前久視云轟霹靂舌擊塗毒鼓聞者俱聾見者悉瞽此是師翁家常未是忌辰極則事銜天子恩受士師法刺目不逃傷膚不撓辛酸聲滿乾坤苦澀名傳天下此是師翁家常未是忌辰極則事復曹溪真面舉笑巖的旨拈白尾驗龍蛇提烏藤驅凡聖只教親炙沾恩聞風受益此是師翁家常亦未是忌辰極則事今日同安法孫既知報德酬恩忌辰極則一事作麼生舉聻近案燒香云修江水接曹溪水同安門對海潮門遂展具拜掃雲居顓愚先老和尚塔師拈香云折臨濟棒鎖曹溪水闡青原不為聖諦興雲居有路隔山竹林禪流雨集五臺衲子雲臻猶未是我先師後事客歲仲秋四日與同門昆季敬卜得一片無陰陽地恭遷法身惟願如日如雲蓋天蓋地去也今日不肖忝居同安祖席聊備信香於人天衆前專伸供養顧左右云且道先師來未良久云燒一分紙著遂大拜為雲居先老和尚圓塔頂巍巍聳秀象王峰上現全身面面玲瓏太虛空裏逞饒舌見聞有賴祖庭增光傘居之家風遮天蓋地曹溪之正脈源遠流長鳳子麟孫因斯出現大機大用在處全彰非我先師大和尚不能全提向上赫奕古今所以一時恆河沙數天龍八部金剛地神晝夜圍繞至於盡未來際無有了日正恁麼時圓頂一句作麼生道良久云昂藏壁立雲端外萬水千山列下風雲居顓愚老人十忌日師拈香云沉檀一瓣才拈起不覺眉尖淚兩行記得老人臨囑句當陽一喝起聯芳遂插香云諸仁者還知老人大人相麼向香煙未起處看便拜弔雲門雪嶠和尚時祭於匡山師子峰不才聞得青獅吼笠子腰包幾欲友恨殺雲居雲又深彌封彌處難通走今朝棄我而西行四海嬰兒失乳母痛腸血淚染雲衣顰蹙雙眉哭破口末法時正法朽獅子絶行多狐狗憶吾師作家手施為動靜甚平常語句辭章不捏扭仔細思世少有正好峰頭棒破天何緣休世不肯久今策杖非其偶青錢粉蝶滿林飛仙掌盈盈當作酒何時覆到古雲門香焚一片重稽首雲居顓愚先老和尚二十周師至塔前拈香云吾師還記得麼於丙戌五月六日午時入般涅槃示寂滅定帶纍腳下兒孫年年此日歲歲今朝繼往開來惟瞻惟仰茲者二十周辰遠承藩司余翁謹修清供列於我師塔前不肖知時識節奠一杯茶燒一炷香要薰我師鼻孔怎奈雲生山色月轉溪聲皆是我師法身不敢世諦流布遂彈指三下顧左右云已開寂滅定現諸威儀來格來歆伏惟尚饗掃同安佛頭峰第二代常察禪師塔千峰連嶽秀萬嶂不知春孤崖倚石坐不下白雲心諸仁者還知此翁人境句子麼千有年來不惟常住此山且日炙風吹消磨不得所以孤迥迥峭巍巍亙古亙今無雜無壞雖然如是苔封荊蔓久矣今日揭出雲霄只要大家共見正恁麼時且道掃塔一句作麼生拈拄杖卓一卓云卓破虛空人境別家風振起鳳棲山掃同安政公禪師塔祖庭湮沒久一塔鎮孤村熱骨雲侵冷翻成鐵面門者是古今不昧的榜樣至今法席重興宗風復振今日山僧燒一炷香供一杯茶願與我師共鎮祖庭遂展具拜云一段慈腸和月冷幾回熱唾帶雲開掃龍門第二代大機用禪師塔師登塔以拄杖指云者座宰堵波埋沒已千載今朝特地新面目不曾改諸仁者且道機禪師不曾改的面目即今在什麼處相逢難見面見面不相識遂焚香作禮掃龍門戒杲空明和尚塔師繞塔一匝云此塔古今不昧日月恆照揭出當陽聖凡一笑清供謹拈重彰體貌大衆且道此老在什麼處良久云白雲時繞青山外緑水常流碧澗中便是此翁真面目令人代代仰清風遂拜設寶峰𠁼庵禪師供師指像云天童後裔笑巖遠孫施馬祖大用大機行臨濟三玄三要到此正好陶鎔後學何緣短笛橫歸致使空山頽裂藏海枯乾正印今日得得為兄錢燒蝴蝶茶點蜻蠅顧左右云且道者漢面目即今還窺得麼良久云爍迦羅眼猶難見狹根魔子豈能知到者裏非但汝窺之無分總使伊聞之猶難直須星攢碧落月浸丹墀翡翠簾垂燭香人靜如此會得才許黃口小兒搭齒粘唇其或未然向山僧與者漢相見中薦取遂拈香泣云一瓣爐中煙篆冷寶珠峰下瀉春潮寒食掃大機禪師塔師云一回打掃一回新時吐煙霞繫故人織錦春花連古壁破天雲浪捲紅塵青青翠竹歌玄調朵朵奇峰展笑嚬信手拈來堪作供願吾機祖鑒微忱遂燒香作禮寒食掃戒杲和尚塔師以拄杖指塔云者座古塔山僧疇昔已為諸人指出分明今日重新舉示是什麼意特為未見者見未聞者聞明初戒杲禪師重興祖席復理宗猷居此寒巖深谷之中被無恥輩把他一片青山埋沒將盡所以山僧今日復理風境且道風境作麼生理遂拈香云清明三月菜花黃雲轉寒崖道骨香嶺後松濤吼落日令人千載仰聲光為龍雲寺聞嚴耆宿起龕值古雲師云淵公聞老宿深居幽谷傲雪欺霜固守一片嵒頭道場自知老病休歇於草四日撩起便行徒衆特請山僧舉揚末後一事顧衆云且道末後起龕一事作麼生舉喝一喝云一輪迸出千竿竹三瀑衝開九疊雲以拄杖指龕云起舉火師以火炬打相云者個便是超生越死的大解脫門未聞嚴先灶裏寒冰結已聞嚴後井中炭更紅於此薦得方識四無遮攔得大自在設若不能山僧為汝髑髏點出眼睛去也攛炬云幾莖不落春秋木撲地燒成朵朵蓮為獅子庵藏一禪師封龕師就龕云聞報藏公歸去也蕭蕭自在冷如風雖然青嶂雲歸後猶待山僧一句封且道作麼生是一句封以拄杖指龕云千山萬壑雲者片可藏一為聖傳鐸副寺舉火師云聖傳副寺三載同志當初越山一擊粉碎惜乎今朝蝶隨花去且道甚麼處去以炬攛下云烈焰長空無背面圓明何處不清光為德光靜主舉火師云德光德光揭露當陽柳巷從君舞蹈孤峰任汝徜徉打相云會得者裏許你格外承當其或未知還要山僧指出短長以炬攛下云渾身拶出金剛焰一朵優曇處處香為戒生闍黎舉火師以火炬打相云來時恁麼來去時恁麼去來去本天然切莫犯回避且道如何得不犯回避去喝一喝云煙霞直透青霄外一道靈光耀古今為慧光火頭舉火師舉炬云性火真空性空真火狹路相逢定無處躲不是冤家不聚頭通身化作劫前火顧衆云慧光火頭到者裏還有轉身處麼遂攛炬云清風一陳長空掃紅日團圞正當午奠顯微元法子師至靈前云圓明妙體本無去來自性天真不屬生死慟惟新寂法子顯微元侍者一生孤硬生鐵鑄成龍門三載巾瓶一朝打失鼻孔同安室裏針芥投機遂以濟北家風兩手分付豈期鹵風忽起北斗頓橫以致法門凋殘慧命莫續今子道友曉也上座秉道義之交念同參之託於數百里外送子靈骨歸山老人不覺五內盡枯聊以祖庭丈左酌金井水調野菜羹奠于我子之前以表師資法愛來格來歆惟茲尚饗奠梅若法子師至位前良久云梅若維那少年英俊秉出世心擔佛祖任操德業廢寢忘餐守律儀如冰似雪山僧以惡辣鉗鎚為伊徹骨徹髓擬為法門利器誰知格外閒人傷哉惜哉兩相辜負諸仁者且道今日還有不辜負處也無顧左右云以此為驗為雲曇禪宿入塔師向塔前云心肝鐵石作用超方復祖庭而不畏死生掌諸山而多般權設只因輔正驅邪以致喪身失命同安今日全賴恩光道風遠播所以山僧自愧無酬只得將斯吉土卜此良辰為伊入祖塔之傍以作千秋遺蹟雖然且入塔一句作麼生道托骨入塔云鐵壁銀山無出入白雲流水有聲名為衆高僧入塔一點墨水兩處成龍空谷傳聲彼此相應也有為生死不畏寒暄也有為叢林不惜身命到如今山僧為他捏聚成團挽回一鏡直教世諦空華塵緣脫盡且道如何是脫盡的事以手數靈骨入塔云一衆同歸無縫塔從教生殺不春秋為旵堂法子起龕師以杖指云龍門升堂同安入室泥牛海底來木馬雲中去透祖師關無蓋無函秉如來命自尊自貴到恁麼地正好紹隆佛種何期一旦鹵歸四五年懇切誰知三十載苦心何在雖然也是世諦門中若實際裏地何曾損壞纖毫只如不損壞的是個什麼一夜雨風頭腦裂千山血淚瀉霜寒遂命舁出弔季納熊居士夙世利根金剛悲願護法雲居三十年聲傳海內恢復同安千萬古名馥諸方訓子孫以聖賢待緇素無彼此坐塵寰中出塵寰外不被諸緣所轉唯愁大法未明如此正好與法門打成一片豈其劫外風生橫吹鐵笛山僧聞之痛淚落腹五內憔然今日乘一葉輕舟特到柩前燒一瓣香奠一杯茶不敢言報德酬恩聊以進平生道契雖然如是更有與君不了一句又作麼生道顧左右云痛淚不同流世諦惟君悲願復重來為退菴禪師起龕師云動也定也昨夜泥牛吞卻月定也動也今朝紅日上東山只得東湧西沒北達南通一段孤光死生不易恭惟示寂退庵禪師守毗尼皎若冰霜具法眼明同古德處僧處俗渾如太古淳風應世應緣成就空華佛事正好一方主化何期鐵笛橫吹致使龍象無依法門清淡今汝弟靈機大德啓合縣檀那命山僧為伊作茶毗佛事今日不敢他辭只得打開玉鎖撥轉玄關為伊判決去也以杖擊龕云少時道破命出為退庵禪師兼舊過空生禪宿舉火師云者個師徒恁麼奇特生時不同生死時不同死生死雖不同就中無彼此所以道青山白雲父白雲青山兒白雲任往來青山總不知既然如是今日為什麼又向者裏聚頭撞腦覿面相逢將末後一段因緣要山僧為伊了卻且道即今更作麼生施設以炬打相云舉起劫前三昧火倒騎木馬上雲霄擲下便行為破衲禪人舉火師云破衲禪人叢林實行聞風滅火為法亡身看伊者段真心可作千古標致奈何不解藏身以致徒空喪命山僧今日只得教伊就火焰中尋一條出路諸仁者且道作麼生是伊出路聻以炬打相云會麼設爾未然不免重下注腳遂擲炬云無底底中重破底有枷枷上再加枷命根截斷終非斷烈焰騰空布雨花為待贈高門余氏孺人火師云昨日山僧出山為弔高公之媳余公之女不意二公擇此良辰命山僧為伊指出生前面目末後因緣今對衆前且道如何結案以炬舉起云性火真空性空真火狹路相逢定沒處躲復擲下云烈焰光中朵朵華天堂佛國親垂手為智微禪德火師云汝本真實人所行真實行迢迢千里來唯求末後事且道末後事作麼生為汝結案以炬打相云四大本空如泡影圓明一點露長空遂擲下便行為廣福初開禪宿起龕師云生也死也若青山之白雲來也去也似當天之杲日本無心于出沒豈有相於去來一道凝然亙古不昧恭惟禪德生世八十一年戒臘四十餘夏受毗尼于傘居之室養道緣于約