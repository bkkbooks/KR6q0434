body:
  text: 嗣法門人性圓旋璣旋哲旋賢等編次募疏募修丕禪師并高僧普同三塔疏豫章海昏之有同安者唐朝古剎也自同安和尚開山而常察禪師居第二代三代得丕禪師宗風大振至今曹洞龍象遍天下悉皆丕祖之腳下兒孫由是列祖代振法席指難數屈山僧於壬寅年濫廁祖位見道場在荊棘叢中慨有興復之志茲喜殿宇佛像漸已就緒每當鶴唳天霜鶯啼春老之際拽杖撥草尋獲常察禪師之塔猶存佛頭峰頂若開山并丕祖高僧普同諸塔雖存有基址而狐窠兔穴風吹雨浸將有所不忍聞不忍見者夫蛙虫朝遷暮返弗忘其本烏羽返哺猶知報恩豈忝在法門如秦人視越之肥瘠乎或檀信長者或曹洞後昆聞風翕然揮金助砌當同阿育王造塔湧出震旦大放光明普天匝地沾恩去也勉旃望之化油疏同安一室黑漆如如自古日不能輝從來月未可照有無一片虛實成團雖然天曉不露何妨夜半正明今告四方檀越八表金湯拈來投子油瓶一任諸方定價舉出揚岐燈盞發揮百寶光明燈草藉以吐燄琉璃因而普徹到恁麼時太乙僊畢竟開眼然燈佛自然眉舞化茶疏冬風喚而不回春陽發而點出優游乎雲霞堆裏茂盛乎雨露場中收歸沒底籃間快樂無煙火上直教露者露而藏者藏囊者囊而橐者橐十方檀那有能信手拈來投於寶鏡清泉烹於溈山巨釜則盧仝碗自浮香趙州瓶自發潤不惟同安僧眾兩腋生風亦且天台羅漢團圞沽味設或有問如何若何山僧只對他道喫茶去募鍋偈南泉打破鍋至今無人補乞箇沒錢人大家相與輔同安則不然偏覓有錢主虀羹與粥飯禪悅在此釜慧明庵募化藥師禪期修建大佛殿靖邑有水曰雙溪溯流而上四十里許有庵名慧明然慧明之名非無由也蓋此地上達曹溪下通廬峊其中往來參詢衲子決明己事接續佛祖慧命源頭者未有不過此也余癸巳秋應龍門請經此一宿至深夜經行偶見四面峰頭煙雲吐秀瑞色衝霄語侍者曰不久於此必建梵剎迨至今春陽回大地萬物咸新余與諸子乘時化道雙溪以效中峰故事仍宿慧明其主人持一冊告曰某欲建立叢林接納雲水請和尚一語導引大檀余深媿無文不能動大方長者聊舉一則陳爛葛藤以報諸君子昔世尊與眾遊行次以手指地云者一片地好建立梵剎帝釋信手拈一莖艸插於地云建梵剎已竟世尊微笑諸居士者兩古人雖則隨處建立不費纖毫檢點將來不無敗缺怎似我融通上座要諸居士大家拋出玉粒金磚各向慧明無陰陽地上建立瓊樓玉殿涌出丈六金身到者裏支無底鍋炊無米飯接待往來千飽萬足與諸居士同獲真實功德同證佛祖光明達士高人不可不信謹疏谷雲峰化修主殿敘道人動止如孤雲野鶴去住自由本無定向所以古德云未有常行而不住未有常住而不行試看古人一言半句意要衲僧如雲如鶴騰於霄漢之外隱於洞壑之中或出或沒了無所舉世未有出格超越如此也惟我韞公動止澹然有古人之氣色不以時鬧動轉自嗣海門洞宗之後乘一葉逆流止於潯陽能仁白雲祖席後入匡山結茅於天池之上聞余主靖邑祖席以杖笠遠來見訪余因邑中於棲雲相接候事畢同入龍門室中兩月意有劈道尋石門理聰翁舊隱以便與龍門往來偶有梅溪湯氏家明德居士領眾檀越請插茅於後山額名谷雲囑余代告十方同扶露柱共補虛堂余于是為敘為北京慈雲寺募化大悲閣緣疏蓋因果之道杳渺難窮世多惑于罔信者惟功驗之理顯然易見人皆共得而趨之何則吾佛從無量劫中以其身心並捨財法兼施故感依正二報廣大無涯天上人間不堪比擬故菩薩復以深重願行逐類現身隨方應跡設慈悲法破其慳貪發其喜捨使天下後世之人各各皆得由斯而入也然而修道者果能效菩薩之行願乎效之則入道之緣有在矣東城盔甲廠慈雲寺乃都內七大名藍之一也有住持容輝上座志氣高上戒德精嚴篤於撐持勤於接待真法門之良榦也山僧從豫章開法二十餘年亦因修造為慮昨來京門忝邀東堂掛搭一日容公商之曰某有一未了之案敢請決之乎山僧詢其故則曰此一片地曾為注水之場萬曆間得翠峰和尚之所創立也當清之時有吾太祖了空自三韓而來單瓢隻杖苦行年深方得道場丕振復得吾祖心如擔荷守成百廢俱興大悲閣未造基址尚存不能就緒由是心祖臨寂之時呼某入室囑之曰此閣乃吾生平未了之願儻子得而述之則吾寂光中知子矣山僧一聞此舉不勝踴躍曰此閣者乃衲僧修道之所眾信崇福之門有益於一方留光於不朽敢不愈加讚助乎山僧雖不能文亦可以此繼述之志書告王公卿相長者大檀若男若女或俗或僧總祈大開寶藏共成有相之功信手拈來同入無為之化俾平地上湧出玉殿瓊樓虛空中突出金容寶相金粟如來放光現瑞大悲菩薩介福儲祥功德齊彰果因不昧想見者聞者亦必有以頓發興起之念也夫江西黃檗山募請書本藏經緣疏豫章新昌黃檗山唐代敕賜報恩光孝禪寺乃希運祖師之道場也因元明之後渝為荒岑復得宗源老宿祖位重來四十餘年勞心苦志不憚寒暄燥溼始獲插艸栽松重新殿宇佛真堂靡不莊嚴見請亦庵和尚說法斯間弘揚向上但思祖席具興唯缺藏經一事夫藏經者乃叢林之大觀人天之要具不可缺也缺之不足以知先德不足以啟後人不足以明大道不足以解玄微及其往古型儀歷來修證又奚足以稽之哉縱能悟徹根源未免管窺佛法有負世尊四十九年三百餘會塵說剎說為人徹頭徹尾之婆心也此為繼往開來承音接響之務可不急乎故宗源老宿每欲計此未得其人幸有孫允吉公者發堅固心行廣大行叩浙省嘉郡泥首振鈴三越歲乃感檀度施若干冊以全藏較之十有二耳余為先師重刻錄附藏寓嘉禾之天寧見公往來酬酢唯以藏經為事因為代書數語遍告王公宰輔諸上善人然而大藏真詮非祖庭莫能持載十方金玉非勝事莫能動搖黃檗乃天下之祖庭檀越乃僧眾之恃怙有祖庭無佛法山不鍾靈有僧眾無檀那人無起色今公此舉可為最勝莫缺之端誰云妄求奢誕之事想能施之人所施之法定是同歸未遂之事既遂之心必為兼得之矣伏願指日告成功德無量雜著曹谿憨山師翁墨蹟跋嘗聞吾祖憨山老人五十餘年說法於南北兩地往往多於金紫行中其與宰官居士往來交接者不知幾何人也究承傳受益契法盟心久約不忘始終一致者不甚多見初聞有伯玉汪公每以詩文勗望不虛矢志之因續聞有右武丁公每於軍戎崇敬不輕患難之為再聞有牧齋錢公掃庵譚公巾瓶從事不忘法道之隆雖則知其大概不知其審也何也山僧開法二十餘年已來總居江右未免地廣人稀聞師翁者多見師翁者少及乎得師翁手書壘積者萬無一矣不期昨來嘉禾得接牧公項居士乃金明介之法嗣襄毅公之後裔入道殊深弘法既久布網垂鉤大有生活之手真紅塵中特出之金毛也山僧正嘆服不知其何異焉忽晤其叔寄庵居士徑於書笈中取一軸見示曰先君楚東歷官粵東別駕與憨大師往來相契話道因緣幸存其蹟和尚其一游目乎山僧得之欣然讀之不暇遂袖歸舊寓細賞其由始知楚東先生乃吾憨祖腹心中人也第知楚先生知憨祖寄居士知山僧則又知牧公知金明皆祖先垂庇非項府信響法門有自哉因此源源故為之跋時乙卯八月日也為瑞慶庵開山碑記山不在高有仙則名水不在深有龍則靈言其本業有成可以隨緣得化也古人建叢林立宗旨轟霹靂於晴空鼓波濤于陸地亦皆以道德為本故在君則安天下之民在臣則攝天下之政仕之用以敷治居之用以滋身聖賢用以設教佛祖用以度迷鬼神不能窺人物不能量如斯玅道可不進之乎而無為公生地武邑曉世空華發無師之智欲求出世之方棄愛緣如敝屣樂善法如醍醐走建昌雲居顓愚老人祝髮按圓通法派取諱音問號無為數年精進持誦勤行苦行知有向上大事便能直下追尋為般若中勇夫也受方融大師具戒有志觀方游泳諸祖道場參禮諸大知識得是非不落之機入見聞不涉之理釘抽楔去實往空歸復思崖居穴處木食荷衣是返本里止宿下高泉得瑞卿葉居士盡底盤桓延至梅園結茆三載惟居士植眾德本種廣福田不忘靈山之委囑遂就址營庵命名瑞慶俾世生傳續千古留雲四眾有依皈之處鄉黨得焚祝之場記其楹前堂後殿樓舍立於西東記其像釋迦為中應真為護大士寶光列於左右饔餐不繼衣缽無充仍施田糧若干為僧恆產鐺實藉以無虞房廊足以容眾公來索記余語坐問焉公曰遠郭七十里景定癸丁奇巒踞其上曲水遶其前余曰此季約之蕭齋維摩之石室公得而居之則吾圓通法派可衍公之本業又可崇矣因是援筆記之以證將來之緣起也同安規約夫出家者離親別族未盡天倫禮佛投師求其向上既知生死事大必當辦道為先為法忘軀莫辭勤苦古人數十年居林下勞其筋骨餓其體膚以致發明此事增益不能方許提綱唱道黼黻宗猷據位稱師臨眾馭物故山僧豎法幢開爐韝以鍛聖凡下惡鉗錘不拘唇吻為諸人以了不了之因緣以明未明之公案間有冒違約束不準規繩九旬不滿即欲抽單出堂一載未終便來告假他往此輩原無志於參求豈有心于決擇俾之同堂則如濁水汙其清流與之共住則如嘉苗亂其稂莠斯乃法門所惡山僧特為嚴革耳諸人既不遠千里萬里冒暑衝風來到同安入堂結制切勿懈怠從前時光虛度必當搬磚運瓦念念如救頭燃心心無有間斷向己分中用工綿密自然透頂透底好與山僧眉毛廝結揭露家風如水合水似空印空何憂乎法道不興何懼乎門庭不振微細規條枚舉於左清化規約夫出世之事應以參禪學道為本遠名利如涕唾輕富貴若浮雲動則不知有營求世界靜則不知有寂守身心形同槁木死灰影合鏡花水月彼即此即人離我離渾無固必之心絕沒和混之意一味勞形苦志忍冷耽饑學聖齊賢成佛作祖提宗唱道了達真乘方不負國王水土之恩父母養育之德師長訓誨之功己分勤劬之力設或意縱情隨苟求安樂誠恐他日閻羅老子扣算飯錢那時無有脫身之計悔不及矣間有一等手持匏器背負囊箱東茶西飯混擾時光決擇之心全無參求之念烏有可惜一生虛度無所實歸恤念將來良可太息是以山僧初來都中慌居此院飲用稀微奈何時節到來不敢違背今亦延留清眾結制安居為汝諸人決明向上雖則有屈高賢亦可聊資道統煩望在此同居之人內外悉宜守分參請遵其首座規矩聽其維那和雅觀其悅眾進退任其知賓營作由其知眾飲食從其湯頭不可仍前散憚放逸自恣交頭接耳說短道長笑罵高聲驚群動眾如有此等輕則跪香巡寮重則責罰出院二六時中務宜各抱本參用誠追究動靜閒忙毋令散失日就月將自然透脫此時正好向鍼鋒上走馬鬧市裏拋磚收放自由全無隔礙果能如是不惟清化與你們寒暄共操握手同行即將從上祖父家私兩手分付可矣珍重珍重湖州府安吉州正堂信官年長興縣正堂信官韓德清縣正堂信官侯武康縣正堂信官馮孝豐縣正堂信官羅仝心捐刻法璽印禪師語錄卷七之十二計字參萬柒百八十七字該銀貳拾貳兩五錢五分佛力被人民闔衙齊沾般若之光大地總受菩提之潤謹意康熙十五年四月日楞嚴藏經坊附板浙禾夏維寧梓
